name: build

on:
  push:
    branches: [ 'main' ]
  pull_request:
    branches: [ 'main' ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        platform: [ubuntu-latest]
        target: 
          - darwin-amd64
          - darwin-arm64
          - windows-amd64
          - linux-arm64-musl
          - linux-amd64-musl
          - windows-arm64
          - android-arm64
          - linux-386
          - linux-amd64
          - linux-arm-5
          - linux-arm-6
          - linux-arm-7
          - linux-arm64
          - linux-mips
          - linux-mipsle
          - linux-mips64
          - linux-mips64le
          - linux-ppc64le
          - linux-riscv64
          - linux-s390x
          - windows-386
          - linux-arm-musleabi
          - linux-arm-musleabihf
          - linux-armel-musleabi
          - linux-armel-musleabihf
          - linux-armv5l-musleabi
          - linux-armv5l-musleabihf
          - linux-armv6-musleabi
          - linux-armv6-musleabihf
          - linux-armv7l-musleabihf
          - linux-armv7m-musleabi
          - linux-armv7r-musleabihf
          - linux-mips-musl
          - linux-mips64-musl
          - linux-mips64le-musl
          - linux-mipsle-musl
          - linux-ppc64le-musl
          - linux-riscv64-musl
          - linux-s390x-musl
          - android-386
          - android-amd64
          - android-arm
          - freebsd-386
          - freebsd-amd64
          - freebsd-arm64
          - windows7-386
          - windows7-amd64
    name: Build
    runs-on: ${{ matrix.platform }}
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - uses: benjlevesque/short-sha@v3.0
        id: short-sha

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup web
        run: bash build.sh dev web

      - name: Build
        uses: go-cross/cgo-actions@v1
        with:
          targets: ${{ matrix.target }}
          musl-target-format: $os-$musl-$arch
          out-dir: build
          x-flags: |
            github.com/alist-org/alist/v3/internal/conf.BuiltAt=$built_at
            github.com/alist-org/alist/v3/internal/conf.GitAuthor=Xhofe
            github.com/alist-org/alist/v3/internal/conf.GitCommit=$git_commit
            github.com/alist-org/alist/v3/internal/conf.Version=$tag
            github.com/alist-org/alist/v3/internal/conf.WebVersion=dev

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openlist_${{ env.SHA }}_${{ matrix.target }}
          path: build/*
